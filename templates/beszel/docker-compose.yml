services:
  beszel-pre:
    image: python:3.11-slim
    restart: "no"
    volumes:
      - beszel_data:/beszel_data
    environment:
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@admin.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin1234}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        pip install -q bcrypt cryptography && python3 - <<'EOF'
        import os, glob, json, secrets, sqlite3, bcrypt
        from cryptography.hazmat.primitives.asymmetric import ed25519
        from cryptography.hazmat.primitives import serialization

        D = "/beszel_data"
        EMAIL, PWD = os.getenv("ADMIN_EMAIL"), os.getenv("ADMIN_PASSWORD")
        STORAGE, TOKEN_F = f"{D}/state.json", f"{D}/agent_token"

        # SSH keypair (write-once)
        kp, pp = f"{D}/id_ed25519", f"{D}/id_ed25519.pub"
        if not os.path.exists(kp):
            priv = ed25519.Ed25519PrivateKey.generate()
            open(kp, "wb").write(priv.private_bytes(
                serialization.Encoding.PEM, serialization.PrivateFormat.OpenSSH, serialization.NoEncryption()))
            os.chmod(kp, 0o600)
            print("pre: generated SSH keypair")
        if not os.path.exists(pp):
            priv = serialization.load_ssh_private_key(open(kp, "rb").read(), password=None)
            open(pp, "wb").write(priv.public_key().public_bytes(
                serialization.Encoding.OpenSSH, serialization.PublicFormat.OpenSSH))

        # Agent token (write-once)
        if not os.path.exists(TOKEN_F):
            open(TOKEN_F, "w").write(secrets.token_hex(32))
            print("pre: generated agent token")

        # Remove stale config.yml
        cfg = f"{D}/config.yml"
        if os.path.exists(cfg):
            os.remove(cfg); print("pre: removed stale config.yml")

        # Re-deploy: sync credentials via SQLite (skipped on first boot)
        dbs = glob.glob(f"{D}/pb_data/data.db") + glob.glob(f"{D}/data.db")
        state = json.loads(open(STORAGE).read()) if os.path.exists(STORAGE) else {}
        if not dbs or not state:
            print("pre: first boot — skipping SQLite sync"); raise SystemExit(0)

        h = bcrypt.hashpw(PWD.encode(), bcrypt.gensalt(10)).decode()
        conn = sqlite3.connect(dbs[0]); cur = conn.cursor()
        has_tk = "tokenKey" in {c[1] for c in cur.execute("PRAGMA table_info(users)")}

        if uid := state.get("user_id"):
            args = (EMAIL, h, secrets.token_hex(32), "admin", uid) if has_tk else (EMAIL, h, "admin", uid)
            cur.execute(f"UPDATE users SET email=?,password=?{',tokenKey=?' if has_tk else ''},role=? WHERE id=?", args)
        if aid := state.get("admin_id"):
            cur.execute("UPDATE _superusers SET email=?,password=? WHERE id=?", (EMAIL, h, aid))
        if sid := state.get("system_id"):
            cur.execute("DELETE FROM systems WHERE id != ?", (sid,))

        conn.commit(); conn.close()
        print("pre: synced credentials")
        EOF

  beszel-hub:
    image: henrygd/beszel:0.18.7
    restart: unless-stopped
    depends_on:
      beszel-pre: { condition: service_completed_successfully }
    volumes:
      - beszel_data:/beszel_data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      USER_EMAIL: ${ADMIN_EMAIL:-admin@admin.com}
      USER_PASSWORD: ${ADMIN_PASSWORD:-admin1234}
      HEARTBEAT_URL: ${HEARTBEAT_URL}
      HEARTBEAT_INTERVAL: ${HEARTBEAT_INTERVAL}
      HEARTBEAT_METHOD: ${HEARTBEAT_METHOD}
    healthcheck:
      test: ["CMD", "/beszel", "health", "--url", "http://127.0.0.1:8090"]
      interval: 10s
      timeout: 3s
      retries: 5

  beszel-agent:
    image: henrygd/beszel-agent:0.18.7
    restart: unless-stopped
    depends_on:
      beszel-hub: { condition: service_healthy }
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - beszel_data:/beszel_data:ro
    environment:
      PORT: 45876
      HUB_URL: http://beszel-hub:8090
      KEY_FILE: /beszel_data/id_ed25519.pub
      TOKEN_FILE: /beszel_data/agent_token

  beszel-post:
    image: python:3.11-slim
    restart: "no"
    depends_on:
      beszel-agent: { condition: service_started }
    volumes:
      - beszel_data:/beszel_data
    environment:
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@admin.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin1234}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-Beszel}
      SMTP_SENDER_ADDRESS: ${SMTP_SENDER_ADDRESS:-}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        python3 - <<'EOF'
        import os, json, time, urllib.request, urllib.error, urllib.parse

        D, BASE = "/beszel_data", "http://beszel-hub:8090"
        EMAIL, PASSWORD = os.getenv("ADMIN_EMAIL"), os.getenv("ADMIN_PASSWORD")
        STORAGE = f"{D}/state.json"

        def api(method, path, data=None, token=None, params=None):
            url = BASE + path + ("?" + urllib.parse.urlencode(params) if params else "")
            req = urllib.request.Request(url, json.dumps(data).encode() if data else None, method=method)
            req.add_header("Content-Type", "application/json")
            if token: req.add_header("Authorization", f"Bearer {token}")
            try:
                with urllib.request.urlopen(req) as r: raw = r.read(); return json.loads(raw) if raw else {}
            except urllib.error.HTTPError as e:
                print(f"post: HTTP {e.code} {method} {path}"); return None

        # Auth with retry (stabilization window)
        for _ in range(30):
            r = api("POST", "/api/collections/_superusers/auth-with-password", {"identity": EMAIL, "password": PASSWORD})
            if r and (tok := r.get("token")): break
            time.sleep(1)
        else:
            raise SystemExit("post: auth failed")

        state = json.loads(open(STORAGE).read()) if os.path.exists(STORAGE) else {}

        # First boot: register agent token and persist IDs
        if not state.get("user_id"):
            uid = api("GET", "/api/collections/users/records", token=tok,
                      params={"filter": f"email='{EMAIL}'", "fields": "id", "perPage": 1})["items"][0]["id"]
            aid = api("GET", "/api/collections/_superusers/records", token=tok,
                      params={"filter": f"email='{EMAIL}'", "fields": "id", "perPage": 1})["items"][0]["id"]
            r = api("POST", "/api/collections/universal_tokens/records",
                    {"user": uid, "token": open(f"{D}/agent_token").read().strip()}, token=tok)
            assert r and r.get("id"), "post: token insert failed"
            api("PATCH", f"/api/collections/users/records/{uid}", {"role": "admin"}, token=tok)
            state.update(user_id=uid, admin_id=aid)
            open(STORAGE, "w").write(json.dumps(state, indent=2))
            print(f"post: provisioned — uid={uid} aid={aid}")
        else:
            print("post: already provisioned — skipping")

        # SMTP (every boot if configured)
        if smtp := os.getenv("SMTP_HOST"):
            port = int(os.getenv("SMTP_PORT", 587))
            r = api("PATCH", "/api/settings", {"smtp": {
                "enabled": True, "host": smtp, "port": port,
                "username": os.getenv("SMTP_USERNAME", ""),
                "password": os.getenv("SMTP_PASSWORD", ""),
                "tls": port == 465, "authMethod": "PLAIN",
            }, "meta": {
                "senderName":    os.getenv("SMTP_SENDER_NAME", "Beszel"),
                "senderAddress": os.getenv("SMTP_SENDER_ADDRESS", ""),
            }}, token=tok)
            print(f"post: SMTP {'applied' if r else 'FAILED'} → {smtp}:{port}")
        else:
            print("post: SMTP_HOST not set — skipped")

        # Sync ADMIN_EMAIL into notification email list (every boot)
        r = api("GET", "/api/collections/user_settings/records", token=tok,
                params={"filter": f"user='{state['user_id']}'", "perPage": 1})
        items = (r or {}).get("items", [])
        if items:
            rec = items[0]
            settings = rec.get("settings") or {}
            email_list = settings.get("emails") or []
            if EMAIL not in email_list:
                email_list.append(EMAIL)
                settings["emails"] = email_list
                r2 = api("PATCH", f"/api/collections/user_settings/records/{rec['id']}",
                         {"settings": settings}, token=tok)
                print(f"post: notification emails → appended {EMAIL} ({'ok' if r2 else 'FAILED'})")
            else:
                print(f"post: notification emails already contain {EMAIL} — skipped")
        else:
            print("post: no user_settings record yet — will be seeded on first UI login")

        # Wait for system record (first boot only, already known on re-deploy)
        if not state.get("system_id"):
            print("post: waiting for system record...")
            for _ in range(60):
                r = api("GET", "/api/collections/systems/records", token=tok, params={"perPage": 200, "sort": "created"})
                if items := (r or {}).get("items"):
                    state["system_id"] = items[0]["id"]
                    print(f"post: system discovered — sid={state['system_id']}")
                    break
                time.sleep(1)
            else:
                raise SystemExit("post: no system discovered after 60s")
        else:
            print(f"post: system known — sid={state['system_id']}")

        sid = state["system_id"]

        # Ensure user↔system association
        api("PATCH", f"/api/collections/systems/records/{sid}", {"users": [state["user_id"]]}, token=tok)

        # Prune duplicate system records
        r = api("GET", "/api/collections/systems/records", token=tok, params={"perPage": 200})
        pruned = [s["id"] for s in (r or {}).get("items", []) if s["id"] != sid]
        for pid in pruned: api("DELETE", f"/api/collections/systems/records/{pid}", token=tok)
        if pruned: print(f"post: pruned {len(pruned)} duplicate(s)")

        open(STORAGE, "w").write(json.dumps(state, indent=2))
        print(f"post: done — sid={sid}")
        EOF

volumes:
  beszel_data: {}
